name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project Rewritr.xcodeproj \
            -scheme Rewritr \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/rewritr-derived" \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build tests
        run: |
          xcodebuild \
            -project Rewritr.xcodeproj \
            -scheme Rewritr \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/rewritr-derived" \
            build-for-testing \
            CODE_SIGNING_ALLOWED=NO
