name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package, for example v0.1.0-beta.1"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build release artifact
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project Rewritr.xcodeproj \
            -scheme Rewritr \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/rewritr-derived" \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          APP_PATH="$RUNNER_TEMP/rewritr-derived/Build/Products/Debug/Rewritr.app"
          ARTIFACT_DIR="$RUNNER_TEMP/rewritr-artifacts"
          mkdir -p "$ARTIFACT_DIR"
          ditto -c -k --keepParent "$APP_PATH" "$ARTIFACT_DIR/Rewritr-${RELEASE_TAG}.zip"
          shasum -a 256 "$ARTIFACT_DIR/Rewritr-${RELEASE_TAG}.zip" > "$ARTIFACT_DIR/Rewritr-${RELEASE_TAG}.zip.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rewritr-${{ github.event.inputs.tag || github.ref_name }}
          path: |
            ${{ runner.temp }}/rewritr-artifacts/Rewritr-${{ github.event.inputs.tag || github.ref_name }}.zip
            ${{ runner.temp }}/rewritr-artifacts/Rewritr-${{ github.event.inputs.tag || github.ref_name }}.zip.sha256

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          RELEASE_NOTES="Unsigned macOS beta build. Download Rewritr-${RELEASE_TAG}.zip, unzip it, and grant Accessibility permission to the app bundle path."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Rewritr ${RELEASE_TAG}" \
              --notes "$RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" \
              "$RUNNER_TEMP/rewritr-artifacts/Rewritr-${RELEASE_TAG}.zip" \
              "$RUNNER_TEMP/rewritr-artifacts/Rewritr-${RELEASE_TAG}.zip.sha256" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$RUNNER_TEMP/rewritr-artifacts/Rewritr-${RELEASE_TAG}.zip" \
              "$RUNNER_TEMP/rewritr-artifacts/Rewritr-${RELEASE_TAG}.zip.sha256" \
              --title "Rewritr ${RELEASE_TAG}" \
              --notes "$RELEASE_NOTES" \
              --verify-tag
          fi
